<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masal - Hikaye Yazarı</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: linear-gradient(135deg,#fff5e6,#ffe8cc); min-height: 100vh; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.08); overflow: hidden; }
  header { background: linear-gradient(135deg,#f57c00,#ff9800); padding: 24px; color: #fff; }
  header h1 { margin: 0 0 4px; font-size: 22px; }
  header p { margin: 0; opacity: .9; font-size: 13px; }
  form { padding: 24px; display: grid; gap: 18px; }
  label { font-size: 13px; font-weight: 600; color: #4e342e; display: grid; gap: 6px; }
  input, select, textarea { font: inherit; padding: 10px 12px; border: 2px solid #ffccbc; border-radius: 10px; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: #f57c00; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  button { font: inherit; font-weight: 700; background: linear-gradient(135deg,#f57c00,#ff9800); color: #fff; border: 0; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 15px; }
  button:disabled { opacity: .6; cursor: wait; }
  .log { margin-top: 16px; background: #fff8e1; border-radius: 10px; padding: 12px; font-size: 13px; min-height: 60px; white-space: pre-wrap; line-height: 1.5; }
  .result { margin-top: 16px; padding: 16px; background: #f1f8e9; border-radius: 10px; display: none; }
  .result h3 { margin: 0 0 8px; color: #2e7d32; }
  .scene { background: #fff; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 13px; }
  .scene strong { color: #bf360c; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>📖 Masal Hikaye Yazarı</h1>
      <p>Dünya standartlarında AI destekli çocuk hikayesi</p>
    </header>
    <form id="f">
      <label>Yaş grubu
        <select name="ageGroup" required>
          <option value="0-3">0-3 (10 sahne, bebek)</option>
          <option value="3-6" selected>3-6 (10 sahne, okul öncesi)</option>
          <option value="6-9">6-9 (14 sahne, ilkokul)</option>
        </select>
      </label>
      <div class="row">
        <label>Kahraman adı <input name="heroName" required placeholder="Refa"></label>
        <label>Yaş <input name="heroAge" type="number" min="0" max="12" value="6"></label>
        <label>Cinsiyet
          <select name="heroGender"><option value="erkek">Erkek</option><option value="kiz">Kız</option></select>
        </label>
      </div>
      <label>Tema / konu
        <input name="theme" placeholder="örn: futbol hayalleri, uzay macerası, yüzmek istemeyen balık">
      </label>
      <label>Kazanımlar (virgülle ayır)
        <input name="lessons" placeholder="Cesaret, Azim, Takım çalışması">
      </label>
      <button id="go" type="submit">Hikayeyi Yaz</button>
      <div class="log" id="log">Hazır.</div>
      <div class="result" id="result"></div>
    </form>
  </div>
<script>
const f = document.getElementById("f");
const log = document.getElementById("log");
const result = document.getElementById("result");
const go = document.getElementById("go");
let es;

function appendLog(msg) { log.textContent += "\n" + msg; log.scrollTop = log.scrollHeight; }

// SSE progress
function connectSSE() {
  if (es) try { es.close(); } catch {}
  es = new EventSource("/api/progress");
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.message) appendLog("• " + d.message);
    } catch {}
  };
}

f.addEventListener("submit", async (ev) => {
  ev.preventDefault();
  go.disabled = true;
  result.style.display = "none";
  log.textContent = "Bağlanıyor...";
  connectSSE();
  const fd = new FormData(f);
  const payload = {
    ageGroup: fd.get("ageGroup"),
    heroName: fd.get("heroName"),
    heroAge: fd.get("heroAge"),
    heroGender: fd.get("heroGender"),
    theme: fd.get("theme"),
    lessons: (fd.get("lessons") || "").split(",").map(s => s.trim()).filter(Boolean),
  };
  try {
    const r = await fetch("/api/story/create", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "bilinmeyen hata");
    appendLog("✅ Hikaye hazır!");
    result.style.display = "block";
    result.innerHTML = `
      <h3>${d.bundle.title}</h3>
      <p>${d.bundle.description || ""}</p>
      <p><strong>Kitap ID:</strong> ${d.bookId} — tam kitap üretimi için ana sayfadaki "${d.bundle.title}" kitabını seçin.</p>
      <p><strong>Bundle:</strong> ${d.bundlePath}</p>
      <details><summary>Sahneler (${d.bundle.scenes.length})</summary>
      ${d.bundle.scenes.map(s => `<div class="scene"><strong>${s.sceneNumber}. ${s.title}</strong> <em>(${s.mood})</em><br>${s.text.replace(/\{CHILD_NAME\}/g, d.bundle.heroName)}</div>`).join("")}
      </details>
      <details><summary>Seçim gerekçesi</summary><div class="scene">${d.bundle.meta.selectionReason || ""}</div></details>`;
  } catch (e) {
    appendLog("❌ Hata: " + e.message);
  } finally {
    go.disabled = false;
    try { es.close(); } catch {}
  }
});
</script>
</body>
</html>
